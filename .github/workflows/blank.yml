name: HYPER-MAC-BENCH-V10
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching God-Mode V10
        shell: bash
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
          HF_TOKEN: "hf_noop" 
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import time, psutil

          console = Console()

          def get_mem():
              return psutil.virtual_memory().used / (1024**3)

          class FinalEngine:
              def __init__(self, model_id, role):
                  self.role = role
                  console.rule(f"[bold white on blue] ⚡ CORE BOOT: {role.upper()} [/]")
                  mem_before = get_mem()
                  
                  start = time.perf_counter()
                  self.model, self.tokenizer = load(model_id)
                  self.load_time = time.perf_counter() - start
                  
                  mem_after = get_mem()
                  console.log(f"[bold green]✓[/] Weights Mapped: {self.load_time:.2f}s | RAM Δ: +{mem_after - mem_before:.2f}GB")

              def execute(self, prompt_text):
                  # Using a Chat Template structure to focus the model
                  messages = [{"role": "user", "content": prompt_text}]
                  prompt = self.tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(Panel(prompt_text, title="📥 User Intent", border_style="bright_blue"))
                  sampler = make_sampler(temp=0.1)
                  
                  tic = time.perf_counter()
                  res = generate(self.model, self.tokenizer, prompt=prompt, max_tokens=128, sampler=sampler, verbose=True)
                  toc = time.perf_counter()
                  
                  tps = len(self.tokenizer.encode(res)) / (toc - tic)
                  console.print(f"\n[bold green]🚀 VELOCITY:[/] {tps:.2f} tok/s")
                  return tps

          def run():
              results = []
              config = {"Teacher": "${{ inputs.model_teacher_hf }}", "Student": "${{ inputs.model_student_hf }}"}

              for role, m_id in config.items():
                  engine = FinalEngine(m_id, role)
                  tps = engine.execute("Fix the syntax error in this Python function: def hello(): print('world'")
                  results.append((role, m_id.split('/')[-1], tps))
                  
                  # Cleanup using the non-deprecated method
                  del engine.model
                  del engine.tokenizer
                  mx.clear_cache()
                  console.log(f"[dim]Memory Purged. Current usage: {get_mem():.2f}GB[/]")

              table = Table(title="\n🏆 FINAL SILICON SUPREMACY RANKINGS", border_style="bold green")
              table.add_column("Rank", justify="center")
              table.add_column("Engine")
              table.add_column("Throughput", justify="right", style="bold cyan")
              
              for i, (role, name, speed) in enumerate(sorted(results, key=lambda x: x[2], reverse=True), 1):
                  table.add_row(str(i), f"{role} ({name})", f"{speed:.2f} tok/s")
              console.print(table)

          if __name__ == "__main__":
              run()
          EOF
          python hyper_engine.py
