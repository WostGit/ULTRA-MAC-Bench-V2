name: HYPER-MAC-BENCH-V27-DEEP-STATE-AGENTIC
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Deep State Agentic Forensics
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          TESTS = [
              {
                  "id": "MRO_INHERITANCE",
                  "name": "Method Resolution Order (MRO)",
                  "prompt": "Code: 'class A: x=1; class B(A): pass; class C(A): x=2; class D(B, C): pass'. What is D.x? Trace the MRO carefully. Think step-by-step. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 2" in x
              },
              {
                  "id": "STACK_UNWIND",
                  "name": "Nested Try-Finally Persistence",
                  "prompt": "Code: 'v=0; try: v=1; raise Exception(); finally: v=2'. If I catch the exception, what is the value of v? Think step-by-step about the execution stack. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 2" in x
              },
              {
                  "id": "NAMESPACE_SHADOW",
                  "name": "Global/Local Shadowing",
                  "prompt": "Code: 'x=1; def f(x): global x; x=2; f(3); print(x)'. This code raises a SyntaxError. Why? Explain the conflict between the parameter x and the global x. End with 'Status: Error'.",
                  "validator": lambda x: "Status: Error" in x or "SyntaxError" in x
              },
              {
                  "id": "TYPE_HINT_CONFLICT",
                  "name": "Metadata vs Implementation",
                  "prompt": "Code: 'def g() -> int: return \"10\"; x = g() + g()'. In Python, what is the value of x? Ignore the type hint; follow the runtime behavior. Think step-by-step. End with 'Result: <value>'.",
                  "validator": lambda x: "Result: 1010" in x.replace('"', "")
              },
              {
                  "id": "DUNDER_MAGIC",
                  "name": "Dynamic Attr (__getattr__)",
                  "prompt": "Code: 'class P: def __getattr__(self, name): return 42; obj=P(); print(hasattr(obj, \"secret\"))'. Does this print True or False? Explain how hasattr interacts with __getattr__. End with 'Result: <True/False>'.",
                  "validator": lambda x: "Result: True" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on red] 🛰️ DEEP-STATE PROBE: {role} [/]")
              model, tokenizer = load(model_id)
              
              for t in TESTS:
                  messages = [
                      {"role": "system", "content": "You are a Senior Python Architect. You must perform a line-by-line memory and stack trace. Do not guess based on common patterns. Be ultra-verbose."},
                      {"role": "user", "content": t["prompt"]}
                  ]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(f"\n[bold cyan]TASK: {t['name']}[/]")
                  start = time.perf_counter()
                  # Extreme verbosity for forensic auditing
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=900, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = t["validator"](output)
                  color = "green" if success else "red"
                  
                  console.print(Panel(output, title=f"Execution Trace - {role}", border_style=color))
                  console.print(f"TPS: {len(tokenizer.encode(output))/dur:.2f} | SUCCESS: {success}")
                  console.print("=" * 60)

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
