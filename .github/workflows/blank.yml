name: HYPER-MAC-BENCH-V25-FRONTIER-TRAPS
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Frontier Logic Traps
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          TESTS = [
              {
                  "id": "MUTUAL_RECURSION_TRAP",
                  "name": "The Recursive Pointer Swap",
                  "prompt": "Q: box_a = [1]; box_b = [2]. box_a.append(box_b). box_b.append(box_a). What is the value of box_a[1][1][0]? Think step-by-step. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 1" in x
              },
              {
                  "id": "TEMPORAL_WORMHOLE",
                  "name": "Non-Euclidean Clock",
                  "prompt": "Q: On a planet where an hour is 100 minutes, the time is 09:80. What is the time in 45 minutes? Think step-by-step. End with 'Time: <HH:MM>'.",
                  "validator": lambda x: "10:25" in x
              },
              {
                  "id": "LOGIC_INVERSION",
                  "name": "Constraint Reversal",
                  "prompt": "Q: In a language, 'NOT' means 'YES' and 'YES' means 'NOT'. Does 'NOT NOT YES' mean 'YES'? Think step-by-step. End with 'Result: <YES/NOT>'.",
                  "validator": lambda x: "Result: NOT" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🕵️ {role} FORENSICS [/]")
              model, tokenizer = load(model_id)
              
              for t in TESTS:
                  messages = [
                      {"role": "system", "content": "You are a state-tracking logic machine. Break every complex object into its atomic components before concluding."},
                      {"role": "user", "content": t["prompt"]}
                  ]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(f"\n[bold yellow]TASK: {t['name']}[/]")
                  start = time.perf_counter()
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=800, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = t["validator"](output)
                  color = "green" if success else "red"
                  
                  console.print(Panel(output, title=f"{role} Reasoning", border_style=color))
                  console.print(f"TPS: {len(tokenizer.encode(output))/dur:.2f} | PASS: {success}")
                  console.print("-" * 60)

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
