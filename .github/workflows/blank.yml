name: HYPER-MAC-BENCH-V24-FORENSIC-0.5B-3B
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching 0.5B vs 3B Forensic Stress Test
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          TESTS = [
              {
                  "id": "THE_APPLE_REFRESH",
                  "name": "The Intentional Distraction",
                  "prompt": "I have 5 apples. You take away 3 apples. Then I give you 1 more. How many apples do YOU have now? Think step-by-step. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 4" in x
              },
              {
                  "id": "REVERSE_ALIAS",
                  "name": "Dynamic Object Tracking",
                  "prompt": "x = [1]. y = x. x = [2]. y.append(3). What is x and what is y? Think step-by-step. End with 'Result: x=<list>, y=<list>'.",
                  "validator": lambda x: "x=[2]" in x.replace(" ", "") and "y=[1,3]" in x.replace(" ", "")
              },
              {
                  "id": "TIME_ROLLOVER_COMPLEX",
                  "name": "Multi-Hour Rollover",
                  "prompt": "A train leaves at 21:30 and the trip lasts 4 hours and 45 minutes. What time does it arrive? Think step-by-step. End with 'Time: <HH:MM>'.",
                  "validator": lambda x: "02:15" in x
              },
              {
                  "id": "NEGATION_LOGIC",
                  "name": "Triple Negation",
                  "prompt": "Is it true that it is not false that the statement 'the sky is not blue' is false? Think step-by-step. End with 'Result: <True/False>'.",
                  "validator": lambda x: "Result: True" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on green] 🔬 FORENSIC MONITOR: {role} [/]")
              model, tokenizer = load(model_id)
              
              for t in TESTS:
                  messages = [
                      {"role": "system", "content": "You are a forensic logic engine. Show all intermediate steps of your calculation. Be extremely verbose."},
                      {"role": "user", "content": t["prompt"]}
                  ]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(f"\n[bold yellow]PROMPT: {t['name']}[/]")
                  start = time.perf_counter()
                  # Extreme max_tokens to see the "hallucination trail"
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=700, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = t["validator"](output)
                  color = "bright_green" if success else "bright_red"
                  
                  console.print(Panel(output, title=f"{role} Monologue", border_style=color))
                  console.print(f"TPS: {len(tokenizer.encode(output))/dur:.2f} | PASS: {success}")
                  console.print("=" * 60)

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
