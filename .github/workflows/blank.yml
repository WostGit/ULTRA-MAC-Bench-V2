name: HYPER-MAC-BENCH-V7
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching God-Mode V7
        shell: bash
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
          HF_TOKEN: "hf_noop" 
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import time, subprocess, psutil

          console = Console()

          def get_clean_telemetry():
              # Quietly probe system metrics
              def probe(cmd):
                  try:
                      return subprocess.check_output(cmd, stderr=subprocess.DEVNULL).decode().strip()
                  except: return "N/A"
              
              mem = psutil.virtual_memory()
              thermal = probe(["sysctl", "-n", "machdep.xcpu.thermal_level"])
              return f"RAM: {mem.percent}% | Thermal State: {thermal}"

          class UltimateEngine:
              def __init__(self, model_id, role):
                  self.role = role
                  console.rule(f"[bold white on red] ⚡ CORE IGNITION: {role.upper()} [/]")
                  
                  start = time.perf_counter()
                  self.model, self.tokenizer = load(model_id)
                  self.load_time = time.perf_counter() - start
                  console.log(f"[bold green]✓[/] Weights Locked & Loaded in {self.load_time:.2f}s")

              def execute(self, prompt):
                  console.print(Panel(f"[bold cyan]INPUT >[/] {prompt}", title="📥 Instruction Buffer", border_style="cyan"))
                  
                  # Verbose=True outputs the standard MLX stats block we saw in your logs
                  # We'll use low temp to kill the repetition bug
                  tic = time.perf_counter()
                  res = generate(
                      self.model, 
                      self.tokenizer, 
                      prompt=prompt, 
                      max_tokens=256, 
                      temp=0.1, 
                      verbose=True
                  )
                  toc = time.perf_counter()
                  
                  duration = toc - tic
                  tokens = len(self.tokenizer.encode(res))
                  tps = tokens / duration
                  
                  console.print(f"\n[bold gold1]📊 REAL-TIME THROUGHPUT >[/] [bold green]{tps:.2f} tokens/s[/]")
                  return tps

          def run():
              results = []
              config = {
                  "Teacher": "${{ inputs.model_teacher_hf }}",
                  "Student": "${{ inputs.model_student_hf }}"
              }

              for role, m_id in config.items():
                  engine = UltimateEngine(m_id, role)
                  tps = engine.execute("Fix the syntax error: def test(): print('hi'")
                  results.append((role, m_id.split('/')[-1], tps))
                  
                  # Cleanup
                  del engine.model
                  del engine.tokenizer
                  mx.metal.clear_cache()
                  console.log(f"[dim]Purge Complete. System Health: {get_clean_telemetry()}[/]")

              # FINAL SUPREMACY TABLE
              table = Table(title="\n🏆 MAC-SILICON SUPREMACY RANKINGS", header_style="bold magenta", border_style="bright_blue")
              table.add_column("Rank", justify="center")
              table.add_column("Engine Role")
              table.add_column("Model Identifier")
              table.add_column("Inference Velocity", justify="right")
              
              # Sort by speed descending
              sorted_res = sorted(results, key=lambda x: x[2], reverse=True)
              for i, (role, name, speed) in enumerate(sorted_res, 1):
                  table.add_row(str(i), role, name, f"{speed:.2f} tok/s")
              
              console.print(table)

          if __name__ == "__main__":
              run()
          EOF
          python hyper_engine.py
