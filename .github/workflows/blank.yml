name: HYPER-MAC-BENCH-V9
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching God-Mode V9
        shell: bash
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
          HF_TOKEN: "hf_noop" 
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import time, subprocess, psutil

          console = Console()

          class FinalEngine:
              def __init__(self, model_id, role):
                  self.role = role
                  console.rule(f"[bold white on red] ⚡ CORE IGNITION: {role.upper()} [/]")
                  
                  start = time.perf_counter()
                  # Load model and tokenizer
                  self.model, self.tokenizer = load(model_id)
                  self.load_time = time.perf_counter() - start
                  console.log(f"[bold green]✓[/] Neural Engine Sync: {self.load_time:.2f}s")

              def execute(self, prompt):
                  console.print(Panel(f"[bold cyan]INPUT >[/] {prompt}", title="📥 Buffer", border_style="cyan"))
                  
                  # EXPLICIT SAMPLER CONFIGURATION
                  # This bypasses the TypeError by handling 'temp' outside generate_step
                  sampler = make_sampler(temp=0.1)
                  
                  console.print(f"[bold yellow]⚡ GENERATING (Sampler: temp=0.1)...[/]")
                  
                  tic = time.perf_counter()
                  res = generate(
                      self.model, 
                      self.tokenizer, 
                      prompt=prompt, 
                      max_tokens=256, 
                      sampler=sampler,
                      verbose=True
                  )
                  toc = time.perf_counter()
                  
                  duration = toc - tic
                  tokens = len(self.tokenizer.encode(res))
                  tps = tokens / duration if duration > 0 else 0
                  
                  console.print(f"\n[bold magenta]📊 METRICS >[/] {tps:.2f} tokens/s")
                  return tps

          def run():
              results = []
              config = {"Teacher": "${{ inputs.model_teacher_hf }}", "Student": "${{ inputs.model_student_hf }}"}

              for role, m_id in config.items():
                  try:
                      engine = FinalEngine(m_id, role)
                      tps = engine.execute("Fix this Python code: def hello(): print('world'")
                      results.append((role, m_id.split('/')[-1], tps))
                      
                      # Aggressive VRAM Purge
                      del engine.model
                      del engine.tokenizer
                      mx.metal.clear_cache()
                  except Exception as e:
                      console.log(f"[bold red]❌ CRITICAL FAILURE:[/] {e}")

              # FINAL RANKING MATRIX
              table = Table(title="\n🏆 MAC-SILICON SUPREMACY RANKINGS", border_style="bold yellow")
              table.add_column("Rank", justify="center")
              table.add_column("Engine")
              table.add_column("Architecture")
              table.add_column("Throughput", justify="right", style="bold green")
              
              sorted_res = sorted(results, key=lambda x: x[2], reverse=True)
              for i, (role, arch, speed) in enumerate(sorted_res, 1):
                  table.add_row(str(i), role, arch, f"{speed:.2f} tok/s")
              
              console.print("\n", table)

          if __name__ == "__main__":
              run()
          EOF
          python hyper_engine.py
