name: HYPER-MAC-BENCH-V18-ULTRA
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-7B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching Ultra Gauntlet
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time, json

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "NESTED_SCHEMA",
                  "name": "Nested Schema Alignment",
                  "prompt": "Create a JSON for a 'Server' with 'status' (string), 'uptime' (int), and 'disks' (a list of objects with 'id' and 'size_gb'). Provide ONLY the minified JSON.",
                  "validator": lambda x: all(k in x for k in ["status", "uptime", "disks", "size_gb"]) and "[" in x
              },
              {
                  "id": "ARCH_PATTERN",
                  "name": "Design Pattern Selection",
                  "prompt": "I need a Python class that ensures only one instance ever exists. Write the class using the most common pattern. Provide ONLY the code.",
                  "validator": lambda x: "__new__" in x or "instance = None" in x or "Singleton" in x
              },
              {
                  "id": "LIB_SYNTH",
                  "name": "Library Synthesis",
                  "prompt": "Write a one-liner using 'math' to calculate the area of a circle with radius 5, then use 'json' to output it as {'area': value}. Provide ONLY the code.",
                  "validator": lambda x: "math.pi" in x and "json.dumps" in x and "25" in x
              },
              {
                  "id": "TIME_LOGIC",
                  "name": "Temporal Reasoning",
                  "prompt": "If a process starts at 11:45 PM and takes 30 minutes, what is the 24-hour time of completion? Think step-by-step, then provide ONLY the time (HH:MM) on the last line.",
                  "validator": lambda x: "00:15" in x.splitlines()[-1]
              },
              {
                  "id": "REF_ERROR",
                  "name": "Cross-Reference Debug",
                  "prompt": "Code: `x = [1, 2]; y = x; y.append(3); print(len(x))`. What is the output? Think step-by-step, then provide ONLY the number on the last line.",
                  "validator": lambda x: "3" == x.splitlines()[-1].strip()
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on red] ⚡ {role} ACTIVATED: {model_id} [/]")
              model, tokenizer = load(model_id)
              results = []
              for t in TESTS:
                  prompt = tokenizer.apply_chat_template([{"role": "user", "content": t["prompt"]}], tokenize=False, add_generation_prompt=True)
                  start = time.perf_counter()
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=500, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  success = False
                  try: success = t["validator"](out)
                  except: success = False
                  results.append({"id": t["id"], "passed": success, "tps": len(tokenizer.encode(out))/dur})
                  console.print(f"   {t['name']}: {'[green]PASS[/]' if success else '[red]FAIL[/]'}")
              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (3B)")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (7B-CODER)")

          table = Table(title="💎 ULTRA AGENTIC CAPABILITY REPORT", border_style="bold magenta")
          table.add_column("Task")
          table.add_column("Student (3B)")
          table.add_column("Teacher (7B-CODER)")

          for i in range(len(TESTS)):
              table.add_row(TESTS[i]["name"], "✅" if s_res[i]["passed"] else "❌", "✅" if t_res[i]["passed"] else "❌")
          
          console.print("\n", table)
          EOF
          python hyper_engine.py
