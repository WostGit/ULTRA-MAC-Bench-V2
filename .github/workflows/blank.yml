name: HYPER-MAC-BENCH-V28-MENTAL-SANDBOX
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Mental Sandbox Forensics
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          TESTS = [
              {
                  "id": "SANDBOX_DUNDER",
                  "name": "Forced-State Dunder Tracking",
                  "prompt": "Code: 'class P: def __getattr__(self, n): return 42; obj=P(); print(hasattr(obj, \"x\"))'. \nINSTRUCTION: Before answering, create a 'Memory Table' with columns [Line, Variable, Object Type, Value]. Then, trace the hasattr() internal CPython call. End with 'Result: <True/False>'.",
                  "validator": lambda x: "Result: True" in x
              },
              {
                  "id": "SANDBOX_LATE_BINDING",
                  "name": "Late-Binding Reference Sandbox",
                  "prompt": "Code: 'l=[1]; add=lambda: l.append(2); l=[3]; add()'. \nINSTRUCTION: Trace the Heap. Specifically, track what object the name 'l' points to at the time 'add' is defined vs when it is called. End with 'Result: l=<list>'.",
                  "validator": lambda x: "Result: l=[3, 2]" in x.replace(" ", "") or "Result: l=[3,2]" in x.replace(" ", "")
              },
              {
                  "id": "SANDBOX_MRO_COMPLEX",
                  "name": "C3 Linearization Sandbox",
                  "prompt": "Code: 'class O: x=0; class A(O): x=1; class B(O): x=2; class C(A, B): pass'. \nINSTRUCTION: List the MRO search order as a list [C, ?, ?, ?, O]. Determine C.x. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 1" in x and "[C, A, B, O]" in x.replace(" ", "")
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on yellow] 🏗️ SANDBOX AUDIT: {role} [/]")
              model, tokenizer = load(model_id)
              
              for t in TESTS:
                  messages = [
                      {"role": "system", "content": "You are a CPython Virtual Machine. You do not predict text; you execute bytecode and manage a Heap/Stack table. You must be ultra-verbose."},
                      {"role": "user", "content": t["prompt"]}
                  ]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(f"\n[bold magenta]SANDBOX TASK: {t['name']}[/]")
                  start = time.perf_counter()
                  # High token limit to allow for the table generation
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=1000, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = t["validator"](output)
                  color = "green" if success else "red"
                  
                  console.print(Panel(output, title=f"Sandbox Trace - {role}", border_style=color))
                  console.print(f"TPS: {len(tokenizer.encode(output))/dur:.2f} | SUCCESS: {success}")
                  console.print("=" * 70)

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
