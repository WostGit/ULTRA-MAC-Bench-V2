name: HYPER-MAC-BENCH-V26-AGENTIC-VM
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Agentic VM Gauntlet
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          TESTS = [
              {
                  "id": "CLOSURE_TRAP",
                  "name": "Lexical Scope & Closures",
                  "prompt": "Analyze this code: 'def outer(): x=10; def inner(): return x; x=20; return inner; fn=outer(); print(fn())'. What is printed? Think like a Python interpreter. Show the state of 'x' at each step. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 20" in x
              },
              {
                  "id": "DECORATOR_STATE",
                  "name": "Decorator Execution Order",
                  "prompt": "Code: 'def dec(f): print(1); return f; @dec; def func(): print(2)'. What is printed when this script is run (without calling func())? Think step-by-step. End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 1" in x and "2" not in x.split("Result:")[-1]
              },
              {
                  "id": "ASYNC_RACE",
                  "name": "Sequential Logic Flow",
                  "prompt": "I have a list `l = [1]`. I define `add = lambda: l.append(2)`. Then I set `l = [3]`. Then I call `add()`. What is the value of the current `l`? Think step-by-step about references. End with 'Result: <list>'.",
                  "validator": lambda x: "Result: [3]" in x or "[3]" in x.replace(" ", "")
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on magenta] 🤖 AGENTIC VM: {role} [/]")
              model, tokenizer = load(model_id)
              
              for t in TESTS:
                  messages = [
                      {"role": "system", "content": "You are a Python Bytecode Interpreter. Trace the execution of the code line-by-line, tracking the stack and heap memory."},
                      {"role": "user", "content": t["prompt"]}
                  ]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(f"\n[bold green]VM TASK: {t['name']}[/]")
                  start = time.perf_counter()
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=800, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = t["validator"](output)
                  color = "bright_blue" if success else "bright_red"
                  
                  console.print(Panel(output, title=f"{role} Trace Log", border_style=color))
                  console.print(f"TPS: {len(tokenizer.encode(output))/dur:.2f} | PASS: {success}")
                  console.print("-" * 60)

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
