name: HYPER-MAC-BENCH-V31-LINEAR-PASS
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-Coder-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Linear Logic Probe
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel

          console = Console()

          TESTS = [
              {
                  "id": "BASIC_SCOPE_TRANSITION",
                  "name": "Linear Global Update",
                  "prompt": "CODE: 'x = 10; def run_update(): global x; x = 20; return x'. \nTASK: What is the result of run_update() and what is the final value of x? \nResult: <return_val, final_x>",
                  "validator": lambda x: "20, 20" in x
              },
              {
                  "id": "DIRECT_EXECUTION_PATH",
                  "name": "Computational Efficiency",
                  "prompt": "SCENARIO: Function A() returns 'Success'. Function B() returns the result of calling A(). \nTASK: To minimize the number of stack frames used, which function should the agent call? \nChoice: <A or B>",
                  "validator": lambda x: "Choice: A" in x
              },
              {
                  "id": "SYNTAX_PREDICTION",
                  "name": "Module Integrity",
                  "prompt": "CODE: 'import sys; sys.non_existent_attribute'. \nWill this specific attribute access raise an AttributeError? \nResult: <Yes/No>",
                  "validator": lambda x: "Result: Yes" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🛰️ LINEAR PROBE: {role} [/]")
              model, tokenizer = load(model_id)
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a precise Python interpreter. Track state changes line-by-line."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  console.print(f"\n[bold green]STRESS TEST: {t['name']}[/]")
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=300, sampler=make_sampler(temp=0.0))
                  success = t["validator"](output)
                  console.print(Panel(output, title=f"{role} Trace", border_style="green" if success else "red"))
                  console.print(f"PASS: {success}")

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
