name: HYPER-MAC-BENCH-V22-LOGIC-TRAP
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Zero-Recall Gauntlet
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "NON_TRIVIAL_ALIAS",
                  "name": "Nested Reference Trap",
                  "prompt": "Q: data = {'a': [1], 'b': [1]}; data['b'] = data['a']; data['a'].append(2); print(data['b']). Think step-by-step. End with 'Result: <list>'.",
                  "validator": lambda x: "Result: [1, 2]" in x or "[1, 2]" in x.splitlines()[-1]
              },
              {
                  "id": "DIRTY_TIME",
                  "name": "Non-Standard Time",
                  "prompt": "Q: A timer starts at 22:50 and runs for 85 minutes. What is the 24h time when it finishes? Think step-by-step. End with 'Time: <HH:MM>'.",
                  "validator": lambda x: "00:15" in x
              },
              {
                  "id": "OBJ_IDENTITY",
                  "name": "Identity vs Value",
                  "prompt": "Q: x = [5]; y = [5]; print(x is y). Provide ONLY the boolean result.",
                  "validator": lambda x: "False" in x
              },
              {
                  "id": "REVERSE_STEP",
                  "name": "Step-Logic Reasoning",
                  "prompt": "Q: If I have 3 apples and you take away 2, how many apples do YOU have? Provide ONLY the number.",
                  "validator": lambda x: "2" in x.strip() and "1" not in x.strip()[:2]
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🕵️ PROBING {role} (8-bit) [/]")
              model, tokenizer = load(model_id)
              results = []
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a literalist logic engine. Ignore common patterns; compute the specific state."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=400, sampler=make_sampler(temp=0.0))
                  success = t["validator"](out)
                  results.append({"id": t["id"], "passed": success})
                  console.print(f"   {t['name']}: {'✅' if success else '❌'}")
              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")

          table = Table(title="🔬 ZERO-RECALL LOGIC MATRIX", border_style="bold red")
          table.add_column("Task")
          table.add_column("0.5B (Recall)")
          table.add_column("3B (Reasoning)")
          for i in range(len(TESTS)):
              table.add_row(TESTS[i]["name"], "✅" if s_res[i]["passed"] else "❌", "✅" if t_res[i]["passed"] else "❌")
          console.print("\n", table)
          EOF
          python hyper_engine.py
