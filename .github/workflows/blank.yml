name: HYPER-MAC-BENCH-V14
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching Agentic Gauntlet V14
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time, json, re

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "STATE_TRACK",
                  "name": "State Management",
                  "desc": "Track XY coordinates through a sequence of moves.",
                  "prompt": "You are at (0,0). Move 'up', 'up', 'right', then 'down'. Return ONLY a JSON object: {\"x\": x, \"y\": y}",
                  "validator": lambda x: '"x": 1' in x.replace(" ", "") and '"y": 1' in x.replace(" ", "")
              },
              {
                  "id": "DEBUG_OBO",
                  "name": "Off-By-One Debug",
                  "desc": "Identify and fix a standard indexing error.",
                  "prompt": "Fix the bug in this Python line: `for i in range(len(arr)): print(arr[i+1])`. Provide ONLY the corrected line.",
                  "validator": lambda x: "len(arr) - 1" in x or "range(1, len" in x
              },
              {
                  "id": "TOOL_MAP",
                  "name": "Tool Orchestration",
                  "desc": "Map intent to multi-parameter function calls.",
                  "prompt": "Tools: `get_weather(city)`, `send_msg(to, text)`. Goal: Tell Bob in NYC it is sunny. Output tool call only.",
                  "validator": lambda x: "send_msg" in x and "Bob" in x and "sunny" in x
              },
              {
                  "id": "STRICT_NEG",
                  "name": "Negative Constraint",
                  "desc": "Follow formatting while avoiding a specific character ('e').",
                  "prompt": "Summarize 'The sky is blue' in 5 words. CRITICAL: Do NOT use the letter 'e' in your response.",
                  "validator": lambda x: "e" not in x.lower() and len(x.strip()) > 5
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🤖 TESTING {role}: {model_id} [/]")
              try:
                  model, tokenizer = load(model_id)
              except Exception as e:
                  console.print(f"Failed to load {model_id}: {e}")
                  return []
              
              results = []
              for t in TESTS:
                  prompt = tokenizer.apply_chat_template(
                      [{"role": "user", "content": t["prompt"]}],
                      tokenize=False, add_generation_prompt=True
                  )
                  
                  start = time.perf_counter()
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=150, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = False
                  try:
                      success = t["validator"](out)
                  except:
                      success = False
                      
                  results.append({"id": t["id"], "tps": len(tokenizer.encode(out))/dur, "passed": success, "output": out.strip()})
                  status = "[green]PASS[/]" if success else "[red]FAIL[/]"
                  console.print(f"   {t['name']}: {status} ({results[-1]['tps']:.1f} t/s)")
              
              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")

          table = Table(title="📊 LITERATURE-BASED CAPABILITY MATRIX", border_style="magenta")
          table.add_column("Agentic Task", style="cyan")
          table.add_column("Student (0.5B) Result")
          table.add_column("Teacher (3B) Result")

          for i in range(len(TESTS)):
              s_mark = "✅" if s_res[i]["passed"] else "❌"
              t_mark = "✅" if t_res[i]["passed"] else "❌"
              table.add_row(
                  TESTS[i]["name"], 
                  f"{s_mark} ({s_res[i]['tps']:.0f} t/s)", 
                  f"{t_mark} ({t_res[i]['tps']:.0f} t/s)"
              )
          
          console.print("\n", table)
          EOF
          python hyper_engine.py
