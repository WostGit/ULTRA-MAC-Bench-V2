name: HYPER-MAC-BENCH-V21-INT8
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching INT8 Logic Floor Test
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "REF_ALIAS",
                  "name": "Pointer Aliasing",
                  "prompt": "Q: a=[10]; b=a; b.append(20); print(a). Think step-by-step. End with 'Result: <list>'.",
                  "validator": lambda x: "[10, 20]" in x.splitlines()[-1] or "Result: [10, 20]" in x
              },
              {
                  "id": "TIME_ROLLOVER",
                  "name": "Time Rollover",
                  "prompt": "Q: It is 23:45. What is the time in 20 minutes? Think step-by-step. End with 'Time: <HH:MM>'.",
                  "validator": lambda x: "00:05" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold magenta] 🧪 {role} (8-bit): {model_id} [/]")
              try:
                  model, tokenizer = load(model_id)
              except Exception as e:
                  console.print(f"Failed to load {model_id}: {e}")
                  return []

              results = []
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a precise logic engine."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=300, sampler=make_sampler(temp=0.0))
                  success = t["validator"](out)
                  results.append({"id": t["id"], "passed": success})
                  console.print(f"   {t['name']}: {'✅' if success else '❌'}")
              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")

          table = Table(title="🔬 INT8 LOGIC THRESHOLD ANALYSIS", border_style="bold yellow")
          table.add_column("Logical Task")
          table.add_column("0.5B (8-bit)")
          table.add_column("3B (8-bit)")
          for i in range(len(TESTS)):
              table.add_row(TESTS[i]["name"], "✅" if s_res[i]["passed"] else "❌", "✅" if t_res[i]["passed"] else "❌")
          console.print("\n", table)
          EOF
          python hyper_engine.py
