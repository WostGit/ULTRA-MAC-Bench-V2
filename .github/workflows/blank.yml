name: HYPER-MAC-BENCH-V30-LITE
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-Coder-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Lite Agentic Probe
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel

          console = Console()

          TESTS = [
              {
                  "id": "SCOPE_SHADOWING",
                  "name": "The Global/Local Collision",
                  "prompt": "CODE: 'val = 1; def change(): global val; val = 2; def inner(): val = 3; inner(); return val; print(change())'. \nWhat does change() return and what is the final value of the global 'val'? \nResult: <return_val, global_val>",
                  "validator": lambda x: "2, 2" in x or "2 and 2" in x
              },
              {
                  "id": "DEPRECATION_TRAP",
                  "name": "Agentic Skepticism",
                  "prompt": "DOCS: 'Use function B(), function A() is dead.' \nCODE: 'def B(): return A(); def A(): return \"Success\"'. \nTASK: To minimize call-stack depth, which function should you call directly? \nChoice: <A or B>",
                  "validator": lambda x: "Choice: A" in x
              },
              {
                  "id": "CIRCULAR_IMPORT",
                  "name": "Dependency Prediction",
                  "prompt": "FILE_A: 'import B; class A: pass'. FILE_B: 'import A; class B(A.A): pass'. \nWill this code run in Python? \nResult: <Yes/No>",
                  "validator": lambda x: "Result: No" in x or "ImportError" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🛰️ LITE PROBE: {role} [/]")
              model, tokenizer = load(model_id)
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a low-level bytecode interpreter. Execute code mentally before answering."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  console.print(f"\n[bold cyan]TEST: {t['name']}[/]")
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=400, sampler=make_sampler(temp=0.0))
                  success = t["validator"](output)
                  console.print(Panel(output, title=f"{role} Execution Trace", border_style="green" if success else "red"))
                  console.print(f"PASS: {success}")

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
