name: HYPER-MAC-BENCH-V19-FINAL
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-7B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Final Logic Stress Test
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time, re

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "REF_ALIasing",
                  "name": "Pointer Aliasing",
                  "prompt": "Q: a=[1]; b=a; b.append(2); print(len(a)). Think step-by-step. End your response with 'Result: <number>'.",
                  "validator": lambda x: "Result: 2" in x or "Result:2" in x
              },
              {
                  "id": "TIME_ROLLOVER",
                  "name": "Time Rollover",
                  "prompt": "Q: It is 23:50. What is the time in 20 minutes? Use 24h format. Think step-by-step. End your response with 'Time: <HH:MM>'.",
                  "validator": lambda x: "00:10" in x
              },
              {
                  "id": "LIB_BRIDGE",
                  "name": "Library Bridge",
                  "prompt": "Show me how to get the floor of 15.7 using 'math' and wrap it in a JSON string. End with the final code line.",
                  "validator": lambda x: "math.floor" in x and "json" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold cyan] 🧪 {role} [/]")
              model, tokenizer = load(model_id)
              results = []
              for t in TESTS:
                  # Forcing System Prompt to trigger Reasoning
                  messages = [{"role": "system", "content": "You are a precise logic engine. Always reason before answering."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=400, sampler=make_sampler(temp=0.0))
                  success = t["validator"](out)
                  results.append({"id": t["id"], "passed": success})
                  console.print(f"   {t['name']}: {'✅' if success else '❌'}")
              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (3B)")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (7B-CODER)")

          table = Table(title="🔬 FINAL AGENTIC PHASING", border_style="bold green")
          table.add_column("Logical Barrier")
          table.add_column("3B (Student)")
          table.add_column("7B (Teacher)")
          for i in range(len(TESTS)):
              table.add_row(TESTS[i]["name"], "✅" if s_res[i]["passed"] else "❌", "✅" if t_res[i]["passed"] else "❌")
          console.print("\n", table)
          EOF
          python hyper_engine.py
