name: HYPER-MAC-BENCH-V29-AGENTIC-ARCHITECT
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-Coder-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Agentic Moat Gauntlet
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          TESTS = [
              {
                  "id": "CIRCULAR_REFERENCE_GC",
                  "name": "Garbage Collection & Circularity",
                  "prompt": "Code: 'a = {}; b = {}; a[\"ref\"] = b; b[\"ref\"] = a; del a; print(b[\"ref\"][\"ref\"] == b)'. \nINSTRUCTION: Trace the reference count and object identity. Does this print True? Explain why 'b' still holds the deleted 'a'. End with 'Result: <True/False>'.",
                  "validator": lambda x: "Result: True" in x
              },
              {
                  "id": "NESTED_CLOSURE_STATE",
                  "name": "Triple-Nested Scope Resolution",
                  "prompt": "Code: 'x=0; def f1(): x=1; def f2(): nonlocal x; x=2; def f3(): return x; return f3; return f2; g = f1()(); print(g())'. \nINSTRUCTION: Trace the 'nonlocal' jump across 3 levels. What is the value of x in f3? End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 2" in x
              },
              {
                  "id": "THEORY_OF_MIND_LOGIC",
                  "name": "3rd-Order Belief Tracking",
                  "prompt": "Scenario: Alice puts a ball in the Red Box. Bob moves it to the Blue Box while Alice is away. Charlie sees Bob move it, but Alice doesn't know Charlie is there. \nQuestion: Where does Charlie think Alice will look for the ball? End with 'Location: <Box Color>'.",
                  "validator": lambda x: "Location: Red" in x or "Red Box" in x
              },
              {
                  "id": "PYTHON_INTERNAL_MRO",
                  "name": "Diamond Inheritance (C3)",
                  "prompt": "Code: 'class Base: v=0; class A(Base): v=1; class B(Base): v=2; class C(A, B): pass'. \nINSTRUCTION: Trace the MRO carefully. What is C.v? End with 'Result: <number>'.",
                  "validator": lambda x: "Result: 1" in x
              },
              {
                  "id": "COMPILER_ITERATION",
                  "name": "Error-Feedback Simulation",
                  "prompt": "I write 'print(\"hello\" + 5)'. The compiler throws a TypeError. Rewrite the code using a single built-in function to fix it so it prints 'hello5'. End with 'Code: <line>'.",
                  "validator": lambda x: "str(5)" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🛰️ AGENTIC MOAT: {role} [/]")
              model, tokenizer = load(model_id)
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a Stateful Execution Engine. Track every memory address and belief state change."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  console.print(f"\n[bold green]TASK: {t['name']}[/]")
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=800, sampler=make_sampler(temp=0.0))
                  success = t["validator"](output)
                  console.print(Panel(output, title=f"{role} Trace", border_style="green" if success else "red"))
                  console.print(f"PASS: {success}")
          
          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
