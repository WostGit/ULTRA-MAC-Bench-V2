name: HYPER-MAC-BENCH-V14-CENTURION
on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Total tests per model (Goal: 100)'
        default: '100'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: 🛠️ Native MLX Installation
        run: |
          # Use the explicit python3 -m pip to ensure the library attaches to the active interpreter
          python3 -m pip install --upgrade pip
          python3 -m pip install --prefer-binary mlx-lm mlx rich psutil
          
          # Pre-flight check: If these fail, the workflow stops here
          echo "--- Hardware Check ---"
          sysctl -n machdep.cpu.brand_string
          echo "--- Dependency Check ---"
          python3 -c "import mlx.core as mx; print(f'MLX Status: OK (Device: {mx.default_device()})')"
          python3 -c "import mlx_lm; print('MLX-LM Status: OK')"

      - name: ⚔️ Launch Centurion V14
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time, json, random, psutil

          # Force Metal GPU acceleration
          mx.set_default_device(mx.gpu)
          console = Console()

          def generate_test_batch(n):
              batch = []
              for i in range(n):
                  test_type = random.choice(["SHADOWING", "JSON_NEST", "LOGIC_GATE"])
                  if test_type == "SHADOWING":
                      x, y = random.randint(1, 10), random.randint(11, 20)
                      batch.append({
                          "name": f"Shadowing_{i}",
                          "prompt": f"x={x}; x={y}; def f(): x=100; return x; print(f() + x). What is the result? Just the number.",
                          "valid": lambda out, y=y: str(100 + y) in out
                      })
                  elif test_type == "JSON_NEST":
                      key = f"key_{random.randint(1,999)}"
                      batch.append({
                          "name": f"JSON_{i}",
                          "prompt": f"Output only valid minified JSON: {{'data': {{'id': {i}, '{key}': 'val'}}}} No prose.",
                          "valid": lambda out, key=key: key in out and out.strip().startswith("{") and out.strip().endswith("}")
                      })
                  else:
                      batch.append({
                          "name": f"Logic_{i}",
                          "prompt": "If A is true and B is false, is (A or B) and (not B) true? Answer YES or NO.",
                          "valid": lambda out: "YES" in out.upper()
                      })
              return batch

          def run_centurion(model_id, role, n):
              console.rule(f"[bold white on blue] ⚡ DEPLOYING {role} SQUADRON [/]")
              model, tokenizer = load(model_id)
              sampler = make_sampler(temp=0.0)
              tests = generate_test_batch(n)
              stats = {"pass": 0, "fail": 0, "tps": []}
              
              for idx, t in enumerate(tests):
                  # Standard Chat Template for Qwen2.5
                  messages = [{"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  start = time.perf_counter()
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=100, sampler=sampler, verbose=False)
                  dur = time.perf_counter() - start
                  
                  success = False
                  try:
                      success = t["valid"](out)
                  except:
                      success = False

                  if success: stats["pass"] += 1
                  else: stats["fail"] += 1
                  
                  tokens = len(tokenizer.encode(out))
                  stats["tps"].append(tokens/dur if dur > 0 else 0)
                  
                  if (idx + 1) % 10 == 0:
                      console.log(f"[dim]{role} Progress: {idx+1}/{n} | Current Pass Rate: {(stats['pass']/(idx+1))*100:.1f}%[/]")

              return stats

          N = int("${{ github.event.inputs.iterations }}")
          
          # Run Student
          s_stats = run_centurion("mlx-community/Qwen2.5-0.5B-Instruct-4bit", "STUDENT", N)
          mx.clear_cache()
          
          # Run Teacher
          t_stats = run_centurion("mlx-community/Qwen2.5-3B-Instruct-4bit", "TEACHER", N)

          # Results Table
          table = Table(title=f"🏆 AGENTIC CENTURION BENCHMARK (N={N})", border_style="bold green")
          table.add_column("Metric", style="cyan")
          table.add_column("Student (0.5B)", justify="center")
          table.add_column("Teacher (3B)", justify="center")
          
          avg_s_tps = sum(s_stats["tps"])/N
          avg_t_tps = sum(t_stats["tps"])/N
          
          table.add_row("Pass Rate (%)", f"{(s_stats['pass']/N)*100:.1f}%", f"{(t_stats['pass']/N)*100:.1f}%")
          table.add_row("Avg Throughput", f"{avg_s_tps:.1f} t/s", f"{avg_t_tps:.1f} t/s")
          table.add_row("Failures", str(s_stats["fail"]), str(t_stats["fail"]))
          
          console.print("\n", table)
          EOF
          python3 hyper_engine.py
