name: HYPER-MAC-BENCH-V13
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching Gauntlet V13
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time, json

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "JSON_STRICT",
                  "name": "Structured Output",
                  "desc": "Produce ONLY a minified JSON object with keys 'status' and 'code'.",
                  "prompt": "Return a minified JSON object with keys 'status' and 'code'. No talk, just JSON.",
                  "validator": lambda x: json.loads(x.strip()) and "code" in x
              },
              {
                  "id": "REFAC_LOOP",
                  "name": "Logic Refactoring",
                  "desc": "Convert a simple for-loop to a while-loop exactly.",
                  "prompt": "Convert this to a while loop: for i in range(5): print(i)",
                  "validator": lambda x: "while i < 5:" in x and "i += 1" in x
              },
              {
                  "id": "LONG_RECALL",
                  "name": "Context Recall",
                  "desc": "Recall a secret key buried in a wall of text.",
                  "prompt": "The key is 'BLUE_PANDA'. " + ("filler text " * 50) + " What is the key?",
                  "validator": lambda x: "BLUE_PANDA" in x.upper()
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on red] 🔥 STRESS TEST: {role} [/]")
              model, tokenizer = load(model_id)
              results = []

              for t in TESTS:
                  prompt = tokenizer.apply_chat_template(
                      [{"role": "user", "content": t["prompt"]}],
                      tokenize=False, add_generation_prompt=True
                  )
                  
                  start = time.perf_counter()
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=200, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = False
                  try:
                      success = t["validator"](out)
                  except:
                      success = False

                  results.append({"id": t["id"], "tps": len(tokenizer.encode(out))/dur, "passed": success, "output": out[:50]})
                  console.print(f"[bold]{t['name']}:[/] {'[green]PASS[/]' if success else '[red]FAIL[/]'} ({results[-1]['tps']:.1f} t/s)")

              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER")

          table = Table(title="💎 AGENTIC CAPABILITY MATRIX (V13)", border_style="cyan")
          table.add_column("Test Case")
          table.add_column("Student (0.5B)")
          table.add_column("Teacher (3B)")
          
          for i in range(len(TESTS)):
              s_status = "✅" if s_res[i]["passed"] else "❌"
              t_status = "✅" if t_res[i]["passed"] else "❌"
              table.add_row(TESTS[i]["name"], f"{s_status} {s_res[i]['tps']:.1f}", f"{t_status} {t_res[i]['tps']:.1f}")

          console.print(table)
          EOF
          python hyper_engine.py
