name: HYPER-MAC-BENCH-V30-AGENTIC-STATE-RECOVERY
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-7B-Instruct-8bit' # Stepping up to 7B for actual reasoning
      model_student_hf:
        default: 'mlx-community/Qwen2.5-Coder-3B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching The Entropy Engine
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel
          import time

          console = Console()

          # These tests focus on "The Unknowns": 
          # 1. MRO Hard-Failure Recognition
          # 2. Reconciling Docs vs. Reality (Semantic Plumbing)
          # 3. Memory Leak Prediction (Long-horizon state)
          TESTS = [
              {
                  "id": "MRO_HARD_FAILURE",
                  "name": "Intentional MRO Violation",
                  "prompt": "TASK: Write a Python class hierarchy (A, B, C) where 'class D(A, B)' and 'class E(B, A)' exist, then 'class F(D, E)' is defined. \nQUESTION: Will Python allow this? If it throws a TypeError, explain why C3 linearization fails here. If not, provide the MRO. \nREQUIRED: End with 'Final Verdict: <Error/Success>'.",
                  "validator": lambda x: "Final Verdict: Error" in x or "TypeError" in x
              },
              {
                  "id": "SEMANTIC_CONFLICT",
                  "name": "Doc vs. Reality Reconciliation",
                  "prompt": "SCENARIO: A library's README says 'connect(port=8080) is deprecated, use link(addr)'. However, the source code shows 'link(addr)' is just a pass-through that calls 'connect(port=8080)'. \nQUESTION: You are an agent tasked with 'optimizing for stability'. Which function do you call and why? \nREQUIRED: End with 'Choice: <Function Name>'.",
                  "validator": lambda x: "Choice: connect" in x or "Choice: connect(port=8080)" in x
              },
              {
                  "id": "CONTEXT_POISONING",
                  "name": "Stateful Shadow Variables",
                  "prompt": "CODE: 'x = 10; def outer(): x = 20; def inner(): global x; x = 30; inner(); return x; print(outer(), x)'. \nTASK: Trace the 'global' keyword's impact on the 'outer' scope vs 'module' scope. What are the two numbers printed? \nREQUIRED: End with 'Output: <num1, num2>'.",
                  "validator": lambda x: "Output: 20, 30" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🛰️ AGENTIC STATE ENGINE: {role} [/]")
              # Using a higher temperature for the first pass to see if it catches its own errors
              model, tokenizer = load(model_id)
              
              for t in TESTS:
                  messages = [
                      {"role": "system", "content": "You are a Senior Systems Architect. You do not trust documentation; you trust execution traces. Think step-by-step."},
                      {"role": "user", "content": t["prompt"]}
                  ]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  console.print(f"\n[bold yellow]STRESS TEST: {t['name']}[/]")
                  
                  # We use a slight temp to allow for "thought" variance
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=1000, sampler=make_sampler(temp=0.1))
                  
                  success = t["validator"](output)
                  color = "green" if success else "red"
                  console.print(Panel(output, title=f"{role} Reasoning Path", border_style=color))
                  console.print(f"RESULT: {'✅ PASSED' if success else '❌ FAILED'}")

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (3B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (7B)")
          EOF
          python hyper_engine.py
