name: HYPER-MAC-BENCH-V4
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'
      num_runs:
        default: '3'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
        
      - name: 🛠️ Turbo Environment Prep
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary mlx-lm rich pytest psutil

      - name: 🧠 Dual-Engine Execution
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from rich.console import Console
          from rich.table import Table
          from rich.live import Live
          from rich.panel import Panel
          from rich.columns import Columns
          from rich.syntax import Syntax
          import time, subprocess, sys, psutil, os, json
          from pathlib import Path

          console = Console()

          def get_hw_stats():
              mem = psutil.virtual_memory()
              return f"RAM: {mem.percent}% | VM: {mem.available / (1024**3):.1f}GB Free"

          class HyperEngine:
              def __init__(self, model_id, role):
                  self.role = role
                  self.model_id = model_id
                  console.rule(f"[bold magenta]🛰️  BOOTING {role.upper()} ENGINE[/]")
                  console.print(f"[dim]Identifier: {model_id}[/]")
                  
                  start = time.perf_counter()
                  self.model, self.tokenizer = load(model_id)
                  self.load_time = time.perf_counter() - start
                  
                  console.log(f"✅ {role} Loaded in {self.load_time:.2f}s")

              def run_task(self, task_id, prompt):
                  console.print(Panel(f"[bold cyan]TASK {task_id}[/]\n{prompt}", title=f"📥 {self.role} Input"))
                  
                  start_gen = time.perf_counter()
                  # High-speed generation
                  response = generate(self.model, self.tokenizer, prompt=prompt, max_tokens=512, verbose=False)
                  duration = time.perf_counter() - start_gen
                  
                  tokens = len(self.tokenizer.encode(response))
                  tps = tokens / duration if duration > 0 else 0
                  
                  syntax = Syntax(response, "python", theme="monokai", line_numbers=True)
                  console.print(Panel(syntax, title=f"📤 {self.role} Response ({tps:.1f} tok/s)"))
                  
                  return {"response": response, "tps": tps, "time": duration}

          def run():
              models = {
                  "Teacher": "${{ inputs.model_teacher_hf }}",
                  "Student": "${{ inputs.model_student_hf }}"
              }
              
              summary_data = []
              
              for role, m_id in models.items():
                  engine = HyperEngine(m_id, role)
                  
                  # Single Task Benchmark for both
                  res = engine.run_task("Logic-Test-01", "Write a python function to find the nth Fibonacci number.")
                  
                  summary_data.append({
                      "Role": role,
                      "Model": m_id.split('/')[-1],
                      "Speed": f"{res['tps']:.2f} t/s",
                      "Load": f"{engine.load_time:.2f}s"
                  })

              # --- FINAL COMPARISON MATRIX ---
              table = Table(title="🚀 Final Benchmark Comparison", border_style="bright_yellow")
              table.add_column("Role", style="bold")
              table.add_column("Model Arch")
              table.add_column("Generation Speed")
              table.add_column("VRAM Load Latency")
              
              for row in summary_data:
                  table.add_row(row["Role"], row["Model"], row["Speed"], row["Load"])
              
              console.print("\n", table)

          if __name__ == "__main__":
              run()
          EOF
          
          python hyper_engine.py
