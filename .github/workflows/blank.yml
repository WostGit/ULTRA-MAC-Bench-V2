name: HYPER-MAC-BENCH-V6
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching God-Mode V6
        shell: bash
        env:
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
          HF_TOKEN: "hf_noop" 
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from rich.console import Console
          from rich.table import Table
          from rich.panel import Panel
          import time, subprocess, psutil, os

          console = Console()

          def get_telemetry():
              # Get memory pressure (macOS specific)
              try:
                  pressure = subprocess.check_output(["sysctl", "-n", "kern.memo_status_level"]).decode().strip()
                  # Thermal state: 0=nominal, 1=fair, 2=serious, 3=critical
                  thermal = subprocess.check_output(["sysctl", "-n", "machdep.xcpu.thermal_level"]).decode().strip()
              except:
                  pressure, thermal = "N/A", "N/A"
              mem = psutil.virtual_memory()
              return f"RAM: {mem.percent}% | Pressure: {pressure} | Thermal: {thermal}"

          class GodEngine:
              def __init__(self, model_id, role):
                  self.role = role
                  console.rule(f"[bold red]💥 AWAKENING {role.upper()} CORE[/]")
                  console.log(f"[dim]Telemetry Pre-Load: {get_telemetry()}[/]")
                  
                  start = time.perf_counter()
                  self.model, self.tokenizer = load(model_id)
                  self.load_time = time.perf_counter() - start
                  console.log(f"[bold green]✓[/] Neural Weights Mapped in {self.load_time:.2f}s")

              def execute(self, prompt):
                  console.print(Panel(f"[bold cyan]INPUT >[/] {prompt}", title="📥 Buffer"))
                  console.print(f"[bold yellow]⚡ GENERATING...[/]")
                  
                  tic = time.perf_counter()
                  # Using verbose=True to get the built-in MLX streaming speed
                  res = generate(self.model, self.tokenizer, prompt=prompt, max_tokens=400, verbose=True)
                  toc = time.perf_counter()
                  
                  duration = toc - tic
                  tokens = len(self.tokenizer.encode(res))
                  tps = tokens / duration
                  
                  console.print(f"\n[bold magenta]📊 METRICS >[/] {tps:.2f} tokens/s | Total Time: {duration:.2f}s")
                  return tps

          def run():
              results = []
              # Restoring the Student so we can see the 100+ TPS speed
              for role, m_id in {"Teacher": "${{ inputs.model_teacher_hf }}", "Student": "${{ inputs.model_student_hf }}"}.items():
                  engine = GodEngine(m_id, role)
                  tps = engine.execute("Fix this Python code: def hello(): print('world'")
                  results.append((role, m_id.split('/')[-1], f"{tps:.1f}"))
                  
                  # Total Purge between runs
                  del engine.model
                  del engine.tokenizer
                  mx.metal.clear_cache()
                  console.log(f"[dim]Post-Run Purge: {get_telemetry()}[/]")

              # FINAL MASTER TABLE
              table = Table(title="🏆 MAC-RELIABILITY SUPREMACY MATRIX", border_style="bold white")
              table.add_column("Rank", justify="center")
              table.add_column("Engine")
              table.add_column("Architecture")
              table.add_column("Inference Speed", style="bold green")
              
              for i, (role, arch, speed) in enumerate(results, 1):
                  table.add_row(str(i), role, arch, f"{speed} tok/s")
              
              console.print("\n", table)

          if __name__ == "__main__":
              run()
          EOF
          python hyper_engine.py
