name: HYPER-MAC-BENCH-V12
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching Gauntlet V12
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time

          mx.set_default_device(mx.gpu)
          console = Console()

          TASKS = [
              {
                  "level": "L1: Logic Inversion",
                  "desc": "Detect a subtle boolean flip in a permission checker.",
                  "code": "def can_access(user):\n    if not user.is_admin or user.has_expired:\n        return True # BUG: Should be False\n    return False"
              },
              {
                  "level": "L2: State Race Condition",
                  "desc": "Identify a missing lock/check in a bank transfer.",
                  "code": "def transfer(src, dst, amt):\n    if src.balance > amt:\n        src.balance -= amt\n        dst.balance += amt # BUG: Missing atomicity/validation"
              },
              {
                  "level": "L3: Complex Recursion",
                  "desc": "Fix a base case in a nested tree traversal that causes infinite loops.",
                  "code": "def find_node(root, val):\n    if root.val == val: return root\n    return find_node(root.left, val) or find_node(root.right, val) # BUG: Missing None check"
              }
          ]

          def run_gauntlet(model_id, role):
              console.rule(f"[bold white on blue] 🧪 TESTING: {role} ({model_id.split('/')[-1]}) [/]")
              model, tokenizer = load(model_id)
              results = []

              for t in TASKS:
                  prompt = tokenizer.apply_chat_template(
                      [{"role": "user", "content": f"Fix the bug in this code. Explain why it is a bug.\nCODE:\n{t['code']}"}],
                      tokenize=False, add_generation_prompt=True
                  )
                  
                  start = time.perf_counter()
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=300, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  # Simple verification logic: Check for key fix strings
                  passed = False
                  if t["level"] == "L1" and "return False" in out: passed = True
                  if t["level"] == "L3" and ("if root is None" in out or "if not root" in out): passed = True
                  if "L2" in t["level"] and ("atomic" in out.lower() or "check" in out.lower()): passed = True

                  results.append({"level": t["level"], "tps": len(tokenizer.encode(out))/dur, "passed": passed})
                  console.print(f"[bold]{t['level']}:[/] {'[green]PASS[/]' if passed else '[red]FAIL[/]'} ({results[-1]['tps']:.1f} tok/s)")

              return results

          # Execute and display final matrix
          s_res = run_gauntlet("${{ inputs.model_student_hf }}", "STUDENT")
          mx.clear_cache()
          t_res = run_gauntlet("${{ inputs.model_teacher_hf }}", "TEACHER")

          table = Table(title="📊 AGENTIC GAP ANALYSIS", border_style="magenta")
          table.add_column("Task Level")
          table.add_column("Student (0.5B)", justify="center")
          table.add_column("Teacher (3B)", justify="center")
          
          for i in range(len(TASKS)):
              s_mark = "✅" if s_res[i]["passed"] else "❌"
              t_mark = "✅" if t_res[i]["passed"] else "❌"
              table.add_row(TASKS[i]["level"], f"{s_mark} ({s_res[i]['tps']:.1f}t/s)", f"{t_mark} ({t_res[i]['tps']:.1f}t/s)")

          console.print(table)
          EOF
          python hyper_engine.py
