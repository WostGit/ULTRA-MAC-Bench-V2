name: HYPER-MAC-BENCH-V32-DISTILL-PROOFER
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-Coder-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Proving the Capability Gap
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel

          console = Console()

          TESTS = [
              {
                  "id": "STATE_FLIP_TRACE",
                  "name": "Sequential Boolean Logic",
                  "prompt": "INSTRUCTION: Trace the value of 'power'. \n1. Power starts as OFF. \n2. Flip power. \n3. If power is ON, set it to OFF. Otherwise, set it to ON. \n4. Flip power again. \nWhat is the final state? \nRESULT: <ON/OFF>",
                  "validator": lambda x: "OFF" in x.upper() and "ON" not in x.upper()[-5:]
              },
              {
                  "id": "ZERO_SHOT_PLANNING",
                  "name": "Constraint-Based Sorting",
                  "prompt": "Items: [Apple, Brick, Cloud]. \nTask: Sort them by weight (lightest to heaviest). \nRESULT: <Item, Item, Item>",
                  "validator": lambda x: "Cloud, Apple, Brick" in x or "Cloud,Apple,Brick" in x
              },
              {
                  "id": "LOGICAL_INFERENCE",
                  "name": "Transitive Relationship",
                  "prompt": "If Group A is bigger than Group B, and Group C is smaller than Group B, which is the smallest group? \nRESULT: <Group>",
                  "validator": lambda x: "Group C" in x
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🛰️ GAP ANALYSIS: {role} [/]")
              model, tokenizer = load(model_id)
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a logical solver. Output only the requested RESULT format."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  console.print(f"\n[bold yellow]PROBE: {t['name']}[/]")
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=200, sampler=make_sampler(temp=0.0))
                  success = t["validator"](output)
                  console.print(Panel(output, title=f"{role} Reasoning", border_style="green" if success else "red"))
                  console.print(f"VALID: {success}")

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
