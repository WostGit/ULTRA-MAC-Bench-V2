name: HYPER-MAC-BENCH-V15-CENTURION
on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of agentic tests'
        default: '100'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: 🛠️ Native arm64 Setup
        run: |
          # Force installation into the active interpreter
          python3 -m pip install --upgrade pip
          python3 -m pip install --prefer-binary mlx-lm mlx rich psutil
          
          # Verification Step
          echo "--- Environment Check ---"
          python3 -c "import mlx.core as mx; print(f'MLX OK | Device: {mx.default_device()}')"
          python3 -c "import mlx_lm; print('MLX-LM OK')"

      - name: ⚔️ Execute Centurion Benchmark
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time, json, random

          mx.set_default_device(mx.gpu)
          console = Console()

          def generate_test_batch(n):
              batch = []
              for i in range(n):
                  t_type = random.choice(["SCOPE", "JSON", "LOGIC"])
                  if t_type == "SCOPE":
                      val = random.randint(50, 150)
                      batch.append({
                          "name": f"Scope_{i}",
                          "prompt": f"x=10; def check(): x={val}; return x; result = check() + x; print(result). What is the output? Just the number.",
                          "valid": lambda out, v=val: str(v + 10) in out
                      })
                  elif t_type == "JSON":
                      batch.append({
                          "name": f"JSON_{i}",
                          "prompt": f"Output only minified JSON: {{'id': {i}, 'status': 'active'}}. No prose.",
                          "valid": lambda out: out.strip().startswith("{") and '"id":' in out
                      })
                  else:
                      batch.append({
                          "name": f"Logic_{i}",
                          "prompt": "If all A are B, and C is A, is C a B? Answer YES or NO.",
                          "valid": lambda out: "YES" in out.upper()
                      })
              return batch

          def run_squadron(model_id, role, n):
              console.rule(f"[bold white] ⚔️ {role} SQUADRON DEPLOYED [/]")
              model, tokenizer = load(model_id)
              sampler = make_sampler(temp=0.0)
              tests = generate_test_batch(n)
              stats = {"pass": 0, "tps": []}
              
              for idx, t in enumerate(tests):
                  messages = [{"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  
                  start = time.perf_counter()
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=50, sampler=sampler, verbose=False)
                  dur = time.perf_counter() - start
                  
                  if t["valid"](out): stats["pass"] += 1
                  stats["tps"].append(len(tokenizer.encode(out))/dur if dur > 0 else 0)
                  
                  if (idx + 1) % 20 == 0:
                      console.log(f"[dim]{role} Heartbeat: {idx+1}/{n} | Accuracy: {(stats['pass']/(idx+1))*100:.1f}%[/]")

              return stats

          N = int("${{ github.event.inputs.iterations }}")
          s_res = run_squadron("mlx-community/Qwen2.5-0.5B-Instruct-4bit", "STUDENT", N)
          mx.clear_cache()
          t_res = run_squadron("mlx-community/Qwen2.5-3B-Instruct-4bit", "TEACHER", N)

          table = Table(title=f"📊 AGENTIC STRESS TEST (N={N})", border_style="bold green")
          table.add_column("Metric")
          table.add_column("Student (0.5B)")
          table.add_column("Teacher (3B)")
          table.add_row("Accuracy (%)", f"{(s_res['pass']/N)*100:.1f}%", f"{(t_res['pass']/N)*100:.1f}%")
          table.add_row("Avg Speed", f"{sum(s_res['tps'])/N:.1f} t/s", f"{sum(t_res['tps'])/N:.1f} t/s")
          console.print("\n", table)
          EOF
          python3 hyper_engine.py
