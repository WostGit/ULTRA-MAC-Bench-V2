name: ULTRA-MAC-Bench-V2
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        description: 'Teacher model'
        required: false
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'
      model_student_hf:
        description: 'Student model'
        required: false
        default: 'mlx-community/Qwen2.5-0.5B-Instruct-4bit'
      num_runs:
        description: 'Runs per task'
        required: false
        default: '3'

jobs:
  benchmark:
    runs-on: macos-15
    timeout-minutes: 180
    steps:
      - name: 📋 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🚀 Turbo Install
        run: |
          python -m pip install --upgrade pip
          # Added --prefer-binary to skip source compilation for speed
          pip install --prefer-binary mlx-lm rich pytest tabulate

      - name: 🧠 Cache MLX Models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: mlx-cache-${{ inputs.model_teacher_hf }}-${{ inputs.model_student_hf }}

      - name: ⚡ Execute Ultra-Verbose Benchmark
        shell: bash
        run: |
          cat > benchmark_core.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from rich.console import Console
          from rich.table import Table
          from rich.live import Live
          from rich.panel import Panel
          import time, json, subprocess, re, sys
          from pathlib import Path
          from datetime import datetime

          console = Console()

          class UltraAgent:
              def __init__(self, model_id):
                  console.print(f"[bold yellow]⚡ INITIALIZING ENGINE:[/][white] {model_id}[/]")
                  # Load model once and keep in memory
                  self.model, self.tokenizer = load(model_id)
                  self.model_id = model_id

              def execute_turn(self, prompt):
                  start = time.perf_counter()
                  # MLX generation
                  response = generate(
                      self.model, 
                      self.tokenizer, 
                      prompt=prompt, 
                      max_tokens=1024,
                      verbose=False
                  )
                  latency = time.perf_counter() - start
                  tokens = len(self.tokenizer.encode(response))
                  tps = tokens / latency if latency > 0 else 0
                  return response, tps

          def setup_task(t_id):
              path = Path(f"benchmark/task_{t_id}")
              path.mkdir(parents=True, exist_ok=True)
              (path / "main.py").write_text("def compute(x):\n    return x + 0 # Buggy")
              (path / "test_main.py").write_text("from main import compute\ndef test_compute(): assert compute(5) == 10")
              return path

          def run_ultra_benchmark():
              models = ["${{ inputs.model_teacher_hf }}", "${{ inputs.model_student_hf }}"]
              num_runs = int("${{ inputs.num_runs }}")
              
              all_results = {}

              for m_id in models:
                  agent = UltraAgent(m_id)
                  model_results = []
                  
                  table = Table(title=f"Live Telemetry: {m_id}")
                  table.add_column("Task")
                  table.add_column("Run")
                  table.add_column("Speed (tok/s)")
                  table.add_column("Status")

                  with Live(table, refresh_per_second=2):
                      for t_id in range(1, 4): # Scaled for demonstration
                          task_path = setup_task(t_id)
                          
                          for run_idx in range(num_runs):
                              prompt = f"Fix the code in {task_path}/main.py so compute(5) returns 10. Return ONLY the new code."
                              resp, tps = agent.execute_turn(prompt)
                              
                              # Minimal 'agent' logic: write response to file
                              (task_path / "main.py").write_text(resp)
                              
                              # Verify
                              res = subprocess.run(["python", "-m", "pytest", task_path], capture_output=True)
                              success = res.returncode == 0
                              
                              status_str = "[green]PASS[/]" if success else "[red]FAIL[/]"
                              table.add_row(f"Task {t_id}", f"{run_idx+1}", f"{tps:.2f}", status_str)
                              model_results.append(success)
                  
                  all_results[m_id] = model_results

              # Final Summary Output
              console.rule("[bold green]BENCHMARK COMPLETE")
              for model, results in all_results.items():
                  rate = (sum(results) / len(results)) * 100
                  console.print(f"[bold]Model:[/] {model} | [bold]Success Rate:[/] {rate:.1f}%")

          if __name__ == "__main__":
              run_ultra_benchmark()
          EOF
          
          python benchmark_core.py
