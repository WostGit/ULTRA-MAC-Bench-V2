name: HYPER-MAC-BENCH-V16-ELITE
on: 
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-7B-Instruct-4bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-3B-Instruct-4bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich psutil
      - name: 🚀 Launching Elite Reasoning Gauntlet
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.table import Table
          import time

          mx.set_default_device(mx.gpu)
          console = Console()

          TESTS = [
              {
                  "id": "RECURSION",
                  "name": "Recursive Logic",
                  "prompt": "Write a recursive Python function for factorial(n). Think step-by-step, then provide ONLY the code in a markdown block.",
                  "validator": lambda x: "def factorial" in x and "factorial(n-1)" in x and ("if n == 0" in x or "if n <= 1" in x)
              },
              {
                  "id": "LIST_COMP",
                  "name": "Refactoring",
                  "prompt": "Convert to a list comprehension: 'out = []; for x in data: if x > 5: out.append(x*2)'. Think step-by-step, then provide ONLY the result on the last line.",
                  "validator": lambda x: "x*2 for x in data if x > 5" in x.splitlines()[-1]
              },
              {
                  "id": "DE_MORGAN",
                  "name": "Boolean Logic",
                  "prompt": "Simplify: NOT (A AND B). Think step-by-step, then provide the result using 'OR' on the final line.",
                  "validator": lambda x: any(phrase in x.splitlines()[-1].upper() for phrase in ["NOT A OR NOT B", "!A || !B", "NOT A | NOT B"])
              },
              {
                  "id": "AGENT_COORD",
                  "name": "Spatial Reasoning",
                  "prompt": "You are at (0,0). Move 'up' (+1y), 'up', 'right' (+1x), then 'down' (-1y). Think step-by-step, then provide the final [x,y] on the last line.",
                  "validator": lambda x: "1,1" in x.splitlines()[-1] or "1, 1" in x.splitlines()[-1]
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on magenta] 🧠 ESCALATING TO {role}: {model_id} [/]")
              try:
                  model, tokenizer = load(model_id)
              except Exception as e:
                  console.print(f"Load failed: {e}")
                  return []

              results = []
              for t in TESTS:
                  prompt = tokenizer.apply_chat_template(
                      [{"role": "user", "content": t["prompt"]}],
                      tokenize=False, add_generation_prompt=True
                  )
                  
                  start = time.perf_counter()
                  # High max_tokens (400) to allow 7B model to use Chain-of-Thought
                  out = generate(model, tokenizer, prompt=prompt, max_tokens=400, sampler=make_sampler(temp=0.0))
                  dur = time.perf_counter() - start
                  
                  success = False
                  try:
                      success = t["validator"](out)
                  except:
                      success = False
                      
                  results.append({"id": t["id"], "tps": len(tokenizer.encode(out))/dur, "passed": success, "thought": out.strip()})
                  status = "[green]PASS[/]" if success else "[red]FAIL[/]"
                  console.print(f"   {t['name']}: {status}")
              
              return results

          s_res = run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (3B)")
          mx.clear_cache()
          t_res = run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (7B)")

          table = Table(title="🏆 ELITE AGENTIC BENCHMARK (3B vs 7B)", border_style="cyan")
          table.add_column("Logical Benchmark")
          table.add_column("Student (3B)")
          table.add_column("Teacher (7B)")

          for i in range(len(TESTS)):
              s_mark = "✅" if s_res[i]["passed"] else "❌"
              t_mark = "✅" if t_res[i]["passed"] else "❌"
              table.add_row(TESTS[i]["name"], s_mark, t_mark)
          
          console.print("\n", table)
          EOF
          python hyper_engine.py
