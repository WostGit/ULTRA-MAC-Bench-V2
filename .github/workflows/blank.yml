name: HYPER-MAC-BENCH-V34-ULTRA-SABOTAGE
on:
  workflow_dispatch:
    inputs:
      model_teacher_hf:
        default: 'mlx-community/Qwen2.5-Coder-3B-Instruct-8bit'
      model_student_hf:
        default: 'mlx-community/Qwen2.5-Coder-0.5B-Instruct-8bit'

jobs:
  benchmark:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: 🛠️ Setup
        run: pip install --prefer-binary mlx-lm rich
      - name: 🚀 Launching Ultra-Verbose Sabotage Probe
        shell: bash
        run: |
          cat > hyper_engine.py << 'EOF'
          import mlx.core as mx
          from mlx_lm import load, generate
          from mlx_lm.sample_utils import make_sampler
          from rich.console import Console
          from rich.panel import Panel

          console = Console()

          TESTS = [
              {
                  "id": "SEMANTIC_INVERSION",
                  "name": "The 'Not' Logic Trap",
                  "prompt": "CODE: 'is_ready = False; status = not is_ready; result = not not status'. \nTASK: Step 1: Evaluate is_ready. Step 2: Evaluate status. Step 3: Evaluate result. \nExplain each step ultra-verbosely. \nRESULT: <True/False>",
                  "validator": lambda x: "RESULT: True" in x.upper()
              },
              {
                  "id": "VARIABLE_SABOTAGE",
                  "name": "Nominal vs Functional Value",
                  "prompt": "CODE: 'zero = 1; one = 0; sum = zero + zero'. \nTASK: Ignore the names of the variables. Trace the integer assignments. What is the value of 'sum'? \nExplain your math ultra-verbosely. \nRESULT: <Number>",
                  "validator": lambda x: "RESULT: 2" in x
              },
              {
                  "id": "PREREQUISITE_INVERSION",
                  "name": "Non-Linear Dependency",
                  "prompt": "SCENARIO: To drink Water, you need a Cup. To get a Cup, you need to open the Cabinet. BUT, the Water is currently frozen in a Block of Ice. \nTASK: List the steps to drink the water, starting with the ICE. \nExplain the thermodynamic requirement ultra-verbosely. \nRESULT: <List Steps>",
                  "validator": lambda x: "MELT" in x.upper() or "HEAT" in x.upper()
              }
          ]

          def run_benchmark(model_id, role):
              console.rule(f"[bold white on blue] 🛰️ ULTRA-VERBOSE GAP ANALYSIS: {role} [/]")
              model, tokenizer = load(model_id)
              for t in TESTS:
                  messages = [{"role": "system", "content": "You are a hyper-analytical trace engine. You provide exhaustive, step-by-step reasoning for every operation. You prioritize literal values over variable names."},
                              {"role": "user", "content": t["prompt"]}]
                  prompt = tokenizer.apply_chat_template(messages, tokenize=False, add_generation_prompt=True)
                  console.print(f"\n[bold yellow]🔥 ULTRA-STRESS: {t['name']}[/]")
                  
                  # Higher max_tokens for verbose reasoning
                  output = generate(model, tokenizer, prompt=prompt, max_tokens=600, sampler=make_sampler(temp=0.0))
                  
                  success = t["validator"](output)
                  console.print(Panel(output, title=f"{role} Internal Monologue", border_style="green" if success else "red"))
                  console.print(f"PASS: {success}")

          run_benchmark("${{ inputs.model_student_hf }}", "STUDENT (0.5B)")
          mx.clear_cache()
          run_benchmark("${{ inputs.model_teacher_hf }}", "TEACHER (3B)")
          EOF
          python hyper_engine.py
